name: StandUpReminder
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
targets:
  StandUpReminder:
    type: application
    platform: macOS
    sources:
      - path: Sources/StandUpReminder
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haotingyi.standupreminder
        PRODUCT_NAME: StandUpReminder
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
